{
  "Dhcp4": {
    "interfaces-config": {
      "interfaces": [ "eth0", "eth1" ]
    },

    "lease-database": {
      "type": "memfile",
      "persist": true,
      "name": "/var/lib/kea/kea-leases4.csv"
    },

    "valid-lifetime": 3600,
    "renew-timer": 900,
    "rebind-timer": 1800,
    "match-client-id": false,

    "subnet4": [
      {
        "id": 1,
        "subnet": "10.10.0.0/24",
        "pools": [
          { "pool": "10.10.0.100 - 10.10.0.199" }
        ],
        "option-data": [
          { "name": "routers", "data": "10.10.0.1" },
          { "name": "domain-name-servers", "data": "10.10.0.2" },
          { "name": "domain-name", "data": "cad.internal" }
        ]
      },
	{
        "id": 2,
        "subnet": "10.10.1.0/24",
        "pools": [
          { "pool": "10.10.1.100 - 10.10.1.199" }
        ],
        "option-data": [
          { "name": "routers", "data": "10.10.1.1" },
          { "name": "domain-name-servers", "data": "10.10.0.2" },
          { "name": "domain-name", "data": "cad.internal" }
        ],
        "reservations": [
          {
            "hw-address": "bc:24:11:4b:a4:ee",
