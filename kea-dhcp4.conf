            "hostname": "DCMaster"
          },
          {
            "hw-address": "bc:24:11:2e:37:d0",
            "ip-address": "10.10.1.106",
            "hostname": "DCController"
          },
	  {
            "hw-address": "BC:24:11:C4:0B:80",
            "ip-address": "10.10.1.100",
            "hostname": "DCBroker"
          },
          {
            "hw-address": "BC:24:11:96:A2:C8",
            "ip-address": "10.10.1.11",
            "hostname": "DCPostgres"
          },
          {
            "hw-address": "BC:24:11:45:EF:8B",
            "ip-address": "10.10.1.105",
            "hostname": "DCStorage"
          }
        ]
      }
